services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: legal_rag
      POSTGRES_USER: legal
      POSTGRES_PASSWORD: legal
    ports:
      - "15432:5432"
    volumes:
      - legal_arag_pgdata:/var/lib/postgresql/data

  api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "pip install --no-cache-dir fastapi uvicorn pydantic httpx opentelemetry-sdk opentelemetry-instrumentation-fastapi python-multipart pypdf psycopg[binary] websockets &&
             uvicorn legal_rag_api.main:app --host 0.0.0.0 --port 8000 --workers 1"
    environment:
      PYTHONPATH: /workspace/apps/api/src:/workspace
      LEGAL_RAG_ARTIFACTS_ROOT: ${LEGAL_RAG_ARTIFACTS_ROOT:-/workspace/.artifacts}
      DATABASE_URL: postgresql://legal:legal@postgres:5432/legal_rag
      OTEL_ENABLED: "1"
      OTEL_TRACE_REQUIRED_FOR_COMPLETENESS: "1"
      LLM_PROVIDER: ${LLM_PROVIDER:-azure}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-mini}
      AZURE_OPENAI_API_MODE: ${AZURE_OPENAI_API_MODE:-chat_completions}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
      AZURE_OPENAI_MAX_TOKENS: ${AZURE_OPENAI_MAX_TOKENS:-96}
      AZURE_OPENAI_TEMPERATURE: ${AZURE_OPENAI_TEMPERATURE:-0.0}
      AZURE_OPENAI_TIMEOUT_SECONDS: ${AZURE_OPENAI_TIMEOUT_SECONDS:-6.0}
      AZURE_OPENAI_TOP_P: ${AZURE_OPENAI_TOP_P:-1.0}
      AZURE_OPENAI_TRIES: ${AZURE_OPENAI_TRIES:-1}
      AZURE_OPENAI_TOKEN_PARAMETER: ${AZURE_OPENAI_TOKEN_PARAMETER:-max_tokens}
      AZURE_OPENAI_REASONING_EFFORT: ${AZURE_OPENAI_REASONING_EFFORT:-}
      AZURE_OPENAI_VERBOSITY: ${AZURE_OPENAI_VERBOSITY:-}
      CORPUS_METADATA_NORMALIZER_PROVIDER: ${CORPUS_METADATA_NORMALIZER_PROVIDER:-}
      CORPUS_METADATA_NORMALIZER_DEPLOYMENT: ${CORPUS_METADATA_NORMALIZER_DEPLOYMENT:-}
      CORPUS_METADATA_NORMALIZER_API_MODE: ${CORPUS_METADATA_NORMALIZER_API_MODE:-}
      CORPUS_METADATA_NORMALIZER_MODEL: ${CORPUS_METADATA_NORMALIZER_MODEL:-}
      CORPUS_METADATA_NORMALIZER_MAX_TOKENS: ${CORPUS_METADATA_NORMALIZER_MAX_TOKENS:-}
      CORPUS_METADATA_NORMALIZER_TIMEOUT_SECONDS: ${CORPUS_METADATA_NORMALIZER_TIMEOUT_SECONDS:-}
      CORPUS_METADATA_NORMALIZER_TOKEN_PARAMETER: ${CORPUS_METADATA_NORMALIZER_TOKEN_PARAMETER:-}
      CORPUS_METADATA_NORMALIZER_REASONING_EFFORT: ${CORPUS_METADATA_NORMALIZER_REASONING_EFFORT:-}
      CORPUS_METADATA_NORMALIZER_VERBOSITY: ${CORPUS_METADATA_NORMALIZER_VERBOSITY:-}
      AGENTIC_ENRICHMENT_LLM_ENABLED: ${AGENTIC_ENRICHMENT_LLM_ENABLED:-0}
      CHUNK_SEMANTICS_PROVIDER: ${CHUNK_SEMANTICS_PROVIDER:-}
      CHUNK_SEMANTICS_DEPLOYMENT: ${CHUNK_SEMANTICS_DEPLOYMENT:-}
      CHUNK_SEMANTICS_API_MODE: ${CHUNK_SEMANTICS_API_MODE:-}
      CHUNK_SEMANTICS_MODEL: ${CHUNK_SEMANTICS_MODEL:-}
      CHUNK_SEMANTICS_MAX_TOKENS: ${CHUNK_SEMANTICS_MAX_TOKENS:-}
      CHUNK_SEMANTICS_TIMEOUT_SECONDS: ${CHUNK_SEMANTICS_TIMEOUT_SECONDS:-}
      CHUNK_SEMANTICS_TOKEN_PARAMETER: ${CHUNK_SEMANTICS_TOKEN_PARAMETER:-}
      CHUNK_SEMANTICS_REASONING_EFFORT: ${CHUNK_SEMANTICS_REASONING_EFFORT:-}
      CHUNK_SEMANTICS_VERBOSITY: ${CHUNK_SEMANTICS_VERBOSITY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-nano}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_MODE: ${OPENAI_API_MODE:-chat_completions}
      OPENAI_MAX_TOKENS: ${OPENAI_MAX_TOKENS:-32}
      OPENAI_TEMPERATURE: ${OPENAI_TEMPERATURE:-0.0}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-6.0}
      OPENAI_TOP_P: ${OPENAI_TOP_P:-1.0}
      OPENAI_TRIES: ${OPENAI_TRIES:-1}
      OPENAI_TOKEN_PARAMETER: ${OPENAI_TOKEN_PARAMETER:-max_tokens}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-}
      OPENAI_SERVICE_TIER: ${OPENAI_SERVICE_TIER:-}
      OPENAI_VERBOSITY: ${OPENAI_VERBOSITY:-}
    ports:
      - "127.0.0.1:8000:8000"
      - "18000:8000"
    depends_on:
      - postgres

  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    volumes:
      - ../..:/workspace
    environment:
      VITE_PROXY_TARGET: http://api:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "127.0.0.1:5173:5173"
      - "15188:5173"
    depends_on:
      - api

  caddy:
    image: caddy:2.10
    ports:
      - "18080:8080"
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - web

volumes:
  legal_arag_pgdata:
