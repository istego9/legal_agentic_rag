openapi: 3.1.0
info:
  title: Legal Agentic RAG Internal Platform API
  version: 0.1.0
  description: Spec-first API for corpus ingestion, QA runtime, evaluation, gold annotation,
    and synthetic dataset generation.
servers:
- url: https://api.example.internal
tags:
- name: Health
- name: Corpus
- name: QA
- name: Runs
- name: Evaluation
- name: Gold
- name: Synthetic
- name: Config
paths:
  /v1/health:
    get:
      tags:
      - Health
      summary: Service health and version
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
                required:
                - status
                - version
  /v1/corpus/import-zip:
    post:
      tags:
      - Corpus
      summary: Import ZIP of PDFs and start preprocessing
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                required:
                - job_id
                - status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                project_id:
                  type: string
                  format: uuid
                blob_url:
                  type: string
                  format: uri
                parse_policy:
                  type: string
                  enum:
                  - fast
                  - balanced
                  - max_quality
                dedupe_enabled:
                  type: boolean
              required:
              - project_id
              - blob_url
              - parse_policy
              - dedupe_enabled
  /v1/corpus/documents:
    get:
      tags:
      - Corpus
      summary: List ingested documents
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DocumentManifest'
                  total:
                    type: integer
                required:
                - items
                - total
  /v1/corpus/documents/{documentId}:
    get:
      tags:
      - Corpus
      summary: Get one document manifest
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentManifest'
      parameters:
      - name: documentId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Internal document UUID
  /v1/corpus/pages/{pageId}:
    get:
      tags:
      - Corpus
      summary: Get one canonical page
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  page_id:
                    type: string
                  text:
                    type: string
                  page_class:
                    type: string
                  entities:
                    type: array
                    items:
                      type: string
                  source_page_id:
                    type: string
                required:
                - page_id
                - text
                - page_class
                - source_page_id
      parameters:
      - name: pageId
        in: path
        required: true
        schema:
          type: string
        description: Canonical page ID
  /v1/corpus/paragraphs/{paragraphId}:
    get:
      tags:
      - Corpus
      summary: Get one paragraph chunk
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParagraphChunk'
      parameters:
      - name: paragraphId
        in: path
        required: true
        schema:
          type: string
        description: Paragraph ID
  /v1/corpus/search:
    post:
      tags:
      - Corpus
      summary: Search corpus paragraphs and pages
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorpusSearchResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorpusSearchRequest'
  /v1/qa/ask:
    post:
      tags:
      - QA
      summary: Answer a single question and return normalized output
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
  /v1/qa/ask-batch:
    post:
      tags:
      - QA
      summary: Answer a batch of questions asynchronously
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                required:
                - run_id
                - status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                project_id:
                  type: string
                  format: uuid
                dataset_id:
                  type: string
                  format: uuid
                question_ids:
                  type: array
                  items:
                    type: string
                runtime_policy:
                  type: object
              required:
              - project_id
              - dataset_id
              - question_ids
              - runtime_policy
  /v1/runs/{runId}:
    get:
      tags:
      - Runs
      summary: Get one inference run
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  run_id:
                    type: string
                    format: uuid
                  dataset_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                  question_count:
                    type: integer
                  created_at:
                    type: string
                    format: date-time
                required:
                - run_id
                - dataset_id
                - status
                - question_count
                - created_at
      parameters:
      - name: runId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Inference run UUID
  /v1/runs/{runId}/questions/{questionId}:
    get:
      tags:
      - Runs
      summary: Get one prediction inside a run
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
      parameters:
      - name: runId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Inference run UUID
      - name: questionId
        in: path
        required: true
        schema:
          type: string
        description: Question ID
  /v1/runs/{runId}/export-submission:
    post:
      tags:
      - Runs
      summary: Export competition submission JSON
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact_url:
                    type: string
                    format: uri
                  question_count:
                    type: integer
                required:
                - artifact_url
                - question_count
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                page_index_base:
                  type: integer
                  enum:
                  - 0
                  - 1
              required:
              - page_index_base
      parameters:
      - name: runId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Inference run UUID
  /v1/eval/runs:
    post:
      tags:
      - Evaluation
      summary: Launch evaluation of a run against a gold dataset
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalRun'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                run_id:
                  type: string
                  format: uuid
                gold_dataset_id:
                  type: string
                  format: uuid
                scoring_policy_version:
                  type: string
                judge_policy_version:
                  type: string
              required:
              - run_id
              - gold_dataset_id
              - scoring_policy_version
              - judge_policy_version
  /v1/eval/runs/{evalRunId}:
    get:
      tags:
      - Evaluation
      summary: Get evaluation run status and metrics
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalRun'
      parameters:
      - name: evalRunId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Evaluation run UUID
  /v1/eval/runs/{evalRunId}/report:
    get:
      tags:
      - Evaluation
      summary: Get full evaluation report with question-level breakdown
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  eval_run:
                    $ref: '#/components/schemas/EvalRun'
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        question_id:
                          type: string
                        answer_score:
                          type: number
                        grounding_score:
                          type: number
                        telemetry_factor:
                          type: number
                        ttft_factor:
                          type: number
                        overall_proxy:
                          type: number
                        error_tags:
                          type: array
                          items:
                            type: string
                      required:
                      - question_id
                      - answer_score
                      - grounding_score
                      - telemetry_factor
                      - ttft_factor
                      - overall_proxy
                      - error_tags
                required:
                - eval_run
                - items
      parameters:
      - name: evalRunId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Evaluation run UUID
  /v1/eval/compare:
    post:
      tags:
      - Evaluation
      summary: Compare two evaluation runs
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  left_eval_run_id:
                    type: string
                    format: uuid
                  right_eval_run_id:
                    type: string
                    format: uuid
                  metric_deltas:
                    type: object
                  question_deltas:
                    type: array
                    items:
                      type: object
                required:
                - left_eval_run_id
                - right_eval_run_id
                - metric_deltas
                - question_deltas
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                left_eval_run_id:
                  type: string
                  format: uuid
                right_eval_run_id:
                  type: string
                  format: uuid
              required:
              - left_eval_run_id
              - right_eval_run_id
  /v1/eval/calibrate-judge:
    post:
      tags:
      - Evaluation
      summary: Calibrate or benchmark free-text judge prompts/models
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  job_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                required:
                - job_id
                - status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                gold_dataset_id:
                  type: string
                  format: uuid
                sample_size:
                  type: integer
                  minimum: 10
                judge_policy_version:
                  type: string
              required:
              - gold_dataset_id
              - sample_size
              - judge_policy_version
  /v1/gold/datasets:
    post:
      tags:
      - Gold
      summary: Create a gold dataset
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoldDataset'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                project_id:
                  type: string
                  format: uuid
                name:
                  type: string
                version:
                  type: string
                base_dataset_id:
                  type:
                  - string
                  - 'null'
                  format: uuid
              required:
              - project_id
              - name
              - version
  /v1/gold/datasets/{goldDatasetId}:
    get:
      tags:
      - Gold
      summary: Get one gold dataset
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoldDataset'
      parameters:
      - name: goldDatasetId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Gold dataset UUID
  /v1/gold/datasets/{goldDatasetId}/questions:
    post:
      tags:
      - Gold
      summary: Create or import a gold question
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoldQuestion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoldQuestion'
      parameters:
      - name: goldDatasetId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Gold dataset UUID
  /v1/gold/questions/{goldQuestionId}:
    patch:
      tags:
      - Gold
      summary: Update one gold question
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoldQuestion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoldQuestion'
      parameters:
      - name: goldQuestionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Gold question UUID
  /v1/gold/questions/{goldQuestionId}/source-sets:
    post:
      tags:
      - Gold
      summary: Add an alternative sufficient source set
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  source_set_id:
                    type: string
                    format: uuid
                required:
                - source_set_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                is_primary:
                  type: boolean
                page_ids:
                  type: array
                  items:
                    type: string
                  uniqueItems: true
                notes:
                  type:
                  - string
                  - 'null'
              required:
              - is_primary
              - page_ids
      parameters:
      - name: goldQuestionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Gold question UUID
  /v1/gold/questions/{goldQuestionId}/review:
    post:
      tags:
      - Gold
      summary: Submit review decision for a gold question
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                - status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                decision:
                  type: string
                  enum:
                  - approve
                  - changes_requested
                  - lock
                comment:
                  type:
                  - string
                  - 'null'
              required:
              - decision
      parameters:
      - name: goldQuestionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Gold question UUID
  /v1/gold/datasets/{goldDatasetId}/lock:
    post:
      tags:
      - Gold
      summary: Lock a gold dataset version
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                - status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason:
                  type:
                  - string
                  - 'null'
      parameters:
      - name: goldDatasetId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Gold dataset UUID
  /v1/gold/datasets/{goldDatasetId}/export:
    get:
      tags:
      - Gold
      summary: Export gold dataset JSON
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifact_url:
                    type: string
                    format: uri
                required:
                - artifact_url
      parameters:
      - name: goldDatasetId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Gold dataset UUID
  /v1/synth/jobs:
    post:
      tags:
      - Synthetic
      summary: Create a synthetic generation job
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyntheticJob'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SyntheticJob'
  /v1/synth/jobs/{jobId}:
    get:
      tags:
      - Synthetic
      summary: Get synthetic generation job status
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyntheticJob'
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Synthetic job UUID
  /v1/synth/jobs/{jobId}/preview:
    post:
      tags:
      - Synthetic
      summary: Preview candidate questions before publication
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        candidate_id:
                          type: string
                          format: uuid
                        question:
                          type: string
                        answer_type:
                          type: string
                        source_pages:
                          type: array
                          items:
                            type: string
                      required:
                      - candidate_id
                      - question
                      - answer_type
                      - source_pages
                required:
                - items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
              required:
              - limit
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Synthetic job UUID
  /v1/synth/items/{candidateId}/approve:
    post:
      tags:
      - Synthetic
      summary: Approve, reject, or edit a synthetic candidate
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                - status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                decision:
                  type: string
                  enum:
                  - approve
                  - reject
                  - edit
                edited_question:
                  type:
                  - string
                  - 'null'
                edited_answer:
                  type:
                  - string
                  - number
                  - boolean
                  - 'null'
                  - array
                edited_source_pages:
                  type:
                  - array
                  - 'null'
                  items:
                    type: string
              required:
              - decision
      parameters:
      - name: candidateId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Synthetic candidate UUID
  /v1/synth/jobs/{jobId}/publish:
    post:
      tags:
      - Synthetic
      summary: Publish approved synthetic candidates as a dataset
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  dataset_id:
                    type: string
                    format: uuid
                  artifact_url:
                    type: string
                    format: uri
                required:
                - dataset_id
                - artifact_url
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                dataset_name:
                  type: string
                version:
                  type: string
              required:
              - dataset_name
              - version
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Synthetic job UUID
  /v1/config/scoring-policies:
    get:
      tags:
      - Config
      summary: List scoring policies
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                required:
                - items
    post:
      tags:
      - Config
      summary: Create or update scoring policy
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                - status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                policy_version:
                  type: string
                policy_type:
                  type: string
                  enum:
                  - contest_emulation
                  - internal_strict
                beta:
                  type: number
                  minimum: 0
                ttft_curve:
                  type: object
                telemetry_policy:
                  type: string
              required:
              - policy_version
              - policy_type
              - beta
              - ttft_curve
              - telemetry_policy
components:
  schemas:
    PageRef:
      title: PageRef
      description: Canonical PDF page reference used in evaluation and submission.
      type: object
      additionalProperties: false
      properties:
        project_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        pdf_id:
          type: string
          pattern: ^[A-Za-z0-9._-]+$
        page_num:
          type: integer
          minimum: 0
        page_index_base:
          type: integer
          enum:
          - 0
          - 1
        source_page_id:
          type: string
          pattern: ^[A-Za-z0-9._-]+_[0-9]+$
        used:
          type: boolean
        evidence_role:
          type: string
          enum:
          - primary
          - supporting
          - title
          - lineage
          - negative_check
        score:
          type: number
          minimum: 0
          maximum: 1
      required:
      - pdf_id
      - page_num
      - page_index_base
      - source_page_id
      - used
    Telemetry:
      title: Telemetry
      description: Per-answer telemetry captured for competition submission and internal
        evaluation.
      type: object
      additionalProperties: false
      properties:
        request_started_at:
          type: string
          format: date-time
        first_token_at:
          type:
          - string
          - 'null'
          format: date-time
        completed_at:
          type: string
          format: date-time
        ttft_ms:
          type: integer
          minimum: 0
        total_response_ms:
          type: integer
          minimum: 0
        time_per_output_token_ms:
          type:
          - number
          - 'null'
          minimum: 0
        input_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        model_name:
          type: string
        route_name:
          type: string
        judge_model_name:
          type:
          - string
          - 'null'
        search_profile:
          type: string
        telemetry_complete:
          type: boolean
        trace_id:
          type: string
      required:
      - request_started_at
      - completed_at
      - ttft_ms
      - total_response_ms
      - input_tokens
      - output_tokens
      - model_name
      - route_name
      - telemetry_complete
    Question:
      title: Question
      description: Competition or internal question unit.
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
        dataset_id:
          type:
          - string
          - 'null'
          format: uuid
        question:
