name: agentfirst-ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: AgentFirst detect (debug)
        run: python scripts/agentfirst.py detect || true
      - name: AgentFirst verify
        run: python scripts/agentfirst.py verify --strict
